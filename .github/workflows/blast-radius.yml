name: Blast Radius Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  blast-radius:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - run: npm install

      - name: Generate CloudFormation changeset
        run: |
          npx cdk synth 2>/dev/null
          cp cdk.out/BlastRadiusDemoBaseline.template.json template.json
          CHANGESET_NAME="blast-radius-$(date +%s)"
          aws cloudformation create-change-set \
            --stack-name BlastRadiusDemoBaseline \
            --change-set-name $CHANGESET_NAME \
            --template-body file://template.json \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
            --change-set-type UPDATE \
            --output json
          aws cloudformation wait change-set-create-complete \
            --stack-name BlastRadiusDemoBaseline \
            --change-set-name $CHANGESET_NAME
          aws cloudformation describe-change-set \
            --stack-name BlastRadiusDemoBaseline \
            --change-set-name $CHANGESET_NAME \
            --output json > changeset.json
          aws cloudformation delete-change-set \
            --stack-name BlastRadiusDemoBaseline \
            --change-set-name $CHANGESET_NAME

      - name: Blast Radius Analysis
        uses: sburgholzer/BlastRadius@v0.1.0
        id: blast-radius
        with:
          format: cloudformation
          input: changeset.json
          threshold: 75
          ai-gate: true
          api-url: ${{ secrets.BLAST_RADIUS_API_URL }}
