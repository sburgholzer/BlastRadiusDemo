name: Blast Radius Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  blast-radius:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - run: npm install

      - name: Blast Radius Analysis
        uses: sburgholzer/BlastRadius@v0.1.0
        id: blast-radius
        with:
          format: cdk
          stack: BlastRadiusDemoBaseline
          threshold: 75
          ai-gate: true
          api-url: ${{ secrets.BLAST_RADIUS_API_URL }}

      - name: Comment PR with Results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const verdict = '${{ steps.blast-radius.outputs.verdict }}' === 'pass' ? '✅ PASS' : '❌ FAIL';
            const deploy = '${{ steps.blast-radius.outputs.recommend-deploy }}';
            const confidence = '${{ steps.blast-radius.outputs.confidence }}';
            const score = '${{ steps.blast-radius.outputs.highest-score }}';
            const affected = '${{ steps.blast-radius.outputs.total-affected }}';
            const summary = `${{ steps.blast-radius.outputs.summary }}`;

            const body = [
              `## 🎯 Blast Radius Analysis — ${verdict}`,
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| Highest Score | ${score}/100 |`,
              `| Affected Resources | ${affected} |`,
              `| AI Recommendation | ${deploy === 'true' ? '✅ Deploy' : '❌ Do Not Deploy'} |`,
              `| Confidence | ${confidence} |`,
              '',
              '---',
              '',
              summary || '*No AI summary available.*',
            ].join('\n');

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
